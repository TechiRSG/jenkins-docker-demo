apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp-deployment

spec:

  replicas: 4

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: myapp

  template:

    metadata:
      labels:
        app: myapp

    spec:

      containers:

      - name: myapp

        image: IMAGE_PLACEHOLDER

        ports:
        - containerPort: 80

        readinessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 15
          periodSeconds: 10
