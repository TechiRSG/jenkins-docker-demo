apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp

        image: us-central1-docker.pkg.dev/poc-01-488406/my-docker-repo/myapp:v1

        ports:
        - containerPort: 80
